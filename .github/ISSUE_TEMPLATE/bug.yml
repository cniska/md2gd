name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Include the command you ran and steps to reproduce if possible.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    attributes:
      label: md2gd version
      placeholder: e.g. 0.1.0 or a commit hash
    validations:
      required: false
