name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: linux-x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify
        if: matrix.target == 'linux-x64'
        run: bun run verify
      - name: Build binary
        run: bun build --compile src/cli.ts --outfile md2gd
      - name: Smoke test binary
        run: bash scripts/smoke-compiled.sh
      - name: Package artifact
        run: |
          mkdir -p artifacts
          tar -czf artifacts/md2gd-${{ matrix.target }}.tar.gz md2gd
          cd artifacts && shasum -a 256 md2gd-${{ matrix.target }}.tar.gz > md2gd-${{ matrix.target }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: md2gd-${{ matrix.target }}
          path: artifacts/

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Prepare source archives
        run: |
          git archive --format=tar.gz --output=artifacts/md2gd-source-${GITHUB_REF_NAME}.tar.gz HEAD
          git archive --format=zip --output=artifacts/md2gd-source-${GITHUB_REF_NAME}.zip HEAD
      - name: Generate checksums
        run: cd artifacts && shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
