name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run verify

  # Compiling + smoke-testing the binary is a nightly job, not a per-PR gate:
  # release.yml rebuilds and smokes all targets at tag time, so a broken binary
  # can never ship -- the nightly just surfaces build breakage within a day
  # instead of paying compile minutes (macOS bills ~10x) on every push and PR.
  compile:
    name: Compile (${{ matrix.target }})
    if: github.event_name == 'schedule'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: darwin-arm64
            runner: macos-latest
          - target: darwin-x64
            runner: macos-26-intel
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build binary
        run: bun build --compile src/cli.ts --outfile md2gd
      - name: Smoke test binary
        run: bash scripts/smoke-compiled.sh
